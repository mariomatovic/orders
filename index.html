<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<!-- Optimized for mobile device scaling and prevents accidental zooming -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Order Field</title>

<!-- Mobile PWA Capability Meta Tags -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f7f8fc">

<!-- Link to the Web App Manifest -->
<link rel="manifest" href="manifest.json">

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f7f8fc;
        color: #111;
        height: 100vh;
        display: flex;
        flex-direction: column;
        /* Disables pull-to-refresh pull down animations */
        overscroll-behavior-y: contain; 
    }

    header {
        display: flex;
        gap: 10px;
        padding: 12px;
        background: white;
        border-bottom: 1px solid #e5e7eb;
    }

    textarea, input {
        border: 1px solid #d1d5db;
        border-radius: 8px;
        padding: 10px;
        font-size: 14px;
        outline: none;
        background: white;
    }

    textarea {
        flex: 1;
        resize: none;
        height: 60px;
    }

    input[type="date"] {
        width: 150px;
    }

    button {
        border: 1px solid #d1d5db;
        background: white;
        border-radius: 8px;
        padding: 10px 14px;
        cursor: pointer;
    }

    button:hover {
        background: #f3f4f6;
    }

    #board {
        flex: 1;
        overflow-y: auto;
        padding: 12px;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 10px;
        align-content: start;
    }

    .card {
        background: white;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        padding: 10px;
        cursor: pointer;
        position: relative;
        transition: 0.15s ease;
        overflow: hidden;
        height: 110px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        -webkit-user-select: none; /* Prevents text selection on long-press */
        user-select: none;
    }

    .card.expanded {
        height: auto;
        min-height: 110px;
    }

    .text {
        font-size: 13px;
        line-height: 1.35;
        white-space: pre-wrap;
    }

    .card:not(.expanded) .text {
        display: -webkit-box;
        -webkit-line-clamp: 4;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }

    .meta {
        font-size: 11px;
        opacity: 0.6;
        margin-top: 6px;
        display: flex;
        justify-content: space-between;
    }

    .x {
        position: absolute;
        top: 6px;
        right: 8px;
        border: none;
        background: transparent;
        font-size: 14px;
        cursor: pointer;
        opacity: 0.35;
    }

    .x:hover {
        opacity: 1;
    }

    .future { border-left: 4px solid #60a5fa; }
    .today { border-left: 4px solid #fbbf24; }
    .delayed { border-left: 4px solid #f87171; }
    .done {
        border-left: 4px solid #9ca3af;
        opacity: 0.35;
    }
</style>
</head>
<body>

<header>
    <textarea id="text" placeholder="write order..."></textarea>
    <input type="date" id="date"/>
    <button onclick="add()">Add</button>
</header>

<div id="board"></div>

<script>
let items = JSON.parse(localStorage.getItem("orders") || "[]");

// Register Service Worker for PWA compliance
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
}

function save(){
    localStorage.setItem("orders", JSON.stringify(items));
}

function add(){
    const text = document.getElementById("text").value.trim();
    const date = document.getElementById("date").value || null;

    if(!text) return;

    items.push({
        id: crypto.randomUUID(),
        text,
        date,
        done: false,
        expanded: false,
        created: Date.now()
    });

    document.getElementById("text").value = "";
    document.getElementById("date").value = "";

    save();
    render();
}

function toggleDone(id){
    items = items.map(i => i.id === id ? { ...i, done: !i.done } : i);
    save();
    render();
}

function toggleExpand(id){
    items = items.map(i => i.id === id ? { ...i, expanded: !i.expanded } : i);
    save();
    render();
}

function remove(id){
    items = items.filter(i => i.id !== id);
    save();
    render();
}

function status(i){
    if(i.done) return "done";
    if(!i.date) return "future";

    const today = new Date().toISOString().split("T")[0];

    if(i.date < today) return "delayed";
    if(i.date === today) return "today";
    return "future";
}

function sortItems(list){
    return [...list].sort((a,b) => {
        const weight = { today:0, future:1, delayed:2, done:3 };
        return weight[status(a)] - weight[status(b)] || (b.created - a.created);
    });
}

function render(){
    const board = document.getElementById("board");
    board.innerHTML = "";

    sortItems(items).forEach(i => {
        const card = document.createElement("div");
        const st = status(i);

        card.className = "card " + st;
        if(i.expanded) card.classList.add("expanded");

        const text = document.createElement("div");
        text.className = "text";
        text.textContent = i.text;

        const meta = document.createElement("div");
        meta.className = "meta";

        const label = st === "done" ? "DELIVERED" : st === "today" ? "ACTIVE" : st === "delayed" ? "DELAYED" : "SCHEDULED";

        meta.innerHTML = `<span>${label}</span><span>${i.date || ""}</span>`;

        const del = document.createElement("button");
        del.className = "x";
        del.textContent = "×";
        del.onclick = (e) => {
            e.stopPropagation();
            remove(i.id);
        };

        card.appendChild(del);
        card.appendChild(text);
        card.appendChild(meta);

        card.onclick = () => toggleExpand(i.id);
        text.ondblclick = (e) => {
            e.stopPropagation();
            toggleDone(i.id);
        };

        board.appendChild(card);
    });
}

render();
</script>
</body>
</html>
