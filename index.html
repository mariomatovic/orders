<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Order Field</title>

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f8fafc">

<link rel="manifest" href="manifest.json">

<style>
    * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: #f8fafc;
        color: #0f172a;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overscroll-behavior-y: contain;
    }

    /* SPOTLESS MODERN HEADER */
    header {
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 16px;
        background: #ffffff;
        border-bottom: 1px solid #e2e8f0;
        box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
    }

    /* INPUT ROW MANAGEMENT */
    .input-group {
        display: flex;
        gap: 10px;
        width: 100%;
    }

    /* BIGGER WRITE ORDER FIELD */
    textarea {
        flex: 1;
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        padding: 12px 14px;
        font-size: 15px;
        outline: none;
        background: #ffffff;
        resize: none;
        height: 75px;
        transition: border-color 0.2s, box-shadow 0.2s;
        font-family: inherit;
    }

    textarea:focus {
        border-color: #3b82f6;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    /* SMALLER COMPACT DATE & BUTTON ROW */
    .action-row {
        display: flex;
        gap: 10px;
        width: 100%;
        justify-content: space-between;
    }

    /* MINIMAL COMPACT DATE FIELD */
    input[type="date"] {
        width: 140px;
        border: 1px solid #cbd5e1;
        border-radius: 10px;
        padding: 8px 12px;
        font-size: 13px;
        outline: none;
        background: #f1f5f9;
        color: #475569;
        font-family: inherit;
        font-weight: 500;
        height: 40px;
    }

    input[type="date"]:focus {
        border-color: #3b82f6;
        background: #ffffff;
    }

    /* MODERN PRIMARY BUTTON */
    header button {
        flex: 1;
        max-width: 120px;
        height: 40px;
        border: none;
        background: #0f172a;
        color: #ffffff;
        border-radius: 10px;
        padding: 0 16px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s, transform 0.1s;
    }

    header button:active {
        background: #1e293b;
        transform: scale(0.98);
    }

    /* REFINED GRID BOARD */
    #board {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 12px;
        align-content: start;
    }

    /* PREMIUM CARD DESIGN */
    .card {
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 14px;
        padding: 14px;
        cursor: pointer;
        position: relative;
        transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
        overflow: hidden;
        height: 115px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.02);
        -webkit-user-select: none;
        user-select: none;
    }

    .card:active {
        transform: scale(0.99);
    }

    .card.expanded {
        height: auto;
        min-height: 115px;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
    }

    .text {
        font-size: 14px;
        line-height: 1.45;
        color: #334155;
        white-space: pre-wrap;
        padding-right: 15px;
        font-weight: 400;
    }

    .card:not(.expanded) .text {
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }

    /* MINIMAL METADATA STRIP */
    .meta {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.03em;
        margin-top: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    /* DELICATE DELETE BUTTON */
    .x {
        position: absolute;
        top: 12px;
        right: 12px;
        border: none;
        background: transparent;
        font-size: 18px;
        color: #94a3b8;
        cursor: pointer;
        line-height: 1;
        padding: 0;
        width: 20px;
        height: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: color 0.15s;
    }

    .x:hover {
        color: #ef4444;
    }

    /* REFINED COLOURED LEFT BORDERS */
    .future { 
        border-left: 5px solid #3b82f6; 
        color: #1e3a8a;
    }
    .future .meta span:first-child { color: #3b82f6; }

    .today { 
        border-left: 5px solid #f59e0b; 
        background: #fffdf5;
    }
    .today .meta span:first-child { color: #d97706; }

    .delayed { 
        border-left: 5px solid #ef4444; 
        background: #fef2f2;
    }
    .delayed .meta span:first-child { color: #dc2626; }

    .done {
        border-left: 5px solid #94a3b8;
        opacity: 0.45;
        background: #f8fafc;
    }
    .done .meta span:first-child { color: #64748b; }
    .done .text { text-decoration: line-through; opacity: 0.75; }
</style>
</head>
<body>

<header>
    <!-- Expanded main textarea -->
    <textarea id="text" placeholder="Write order details here..."></textarea>
    
    <!-- Compact actions row underneath -->
    <div class="action-row">
        <input type="date" id="date"/>
        <button onclick="add()">Add Order</button>
    </div>
</header>

<div id="board"></div>

<script>
let items = JSON.parse(localStorage.getItem("orders") || "[]");

if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
}

function save(){
    localStorage.setItem("orders", JSON.stringify(items));
}

function add(){
    const text = document.getElementById("text").value.trim();
    const date = document.getElementById("date").value || null;

    if(!text) return;

    items.push({
        id: crypto.randomUUID(),
        text,
        date,
        done: false,
        expanded: false,
        created: Date.now()
    });

    document.getElementById("text").value = "";
    document.getElementById("date").value = "";

    save();
    render();
}

function toggleDone(id){
    items = items.map(i => i.id === id ? { ...i, done: !i.done } : i);
    save();
    render();
}

function toggleExpand(id){
    items = items.map(i => i.id === id ? { ...i, expanded: !i.expanded } : i);
    save();
    render();
}

function remove(id){
    items = items.filter(i => i.id !== id);
    save();
    render();
}

function status(i){
    if(i.done) return "done";
    if(!i.date) return "future";

    const today = new Date().toISOString().split("T")[0];

    if(i.date < today) return "delayed";
    if(i.date === today) return "today";
    return "future";
}

function sortItems(list){
    return [...list].sort((a,b) => {
        const weight = { today:0, future:1, delayed:2, done:3 };
        return weight[status(a)] - weight[status(b)] || (b.created - a.created);
    });
}

function formatDisplayDate(dateStr) {
    if (!dateStr) return "";
    try {
        const parts = dateStr.split('-');
        if (parts.length === 3) {
            return `${parts[2]}/${parts[1]}/${parts[0].slice(-2)}`;
        }
    } catch(e) {}
    return dateStr;
}

function render(){
    const board = document.getElementById("board");
    board.innerHTML = "";

    sortItems(items).forEach(i => {
        const card = document.createElement("div");
        const st = status(i);

        card.className = "card " + st;
        if(i.expanded) card.classList.add("expanded");

        const text = document.createElement("div");
        text.className = "text";
        text.textContent = i.text;

        const meta = document.createElement("div");
        meta.className = "meta";

        const label = st === "done" ? "DELIVERED" : st === "today" ? "ACTIVE" : st === "delayed" ? "DELAYED" : "SCHEDULED";
        const displayDate = formatDisplayDate(i.date);

        meta.innerHTML = `<span>${label}</span><span style="color: #64748b;">${displayDate}</span>`;

        const del = document.createElement("button");
        del.className = "x";
        del.innerHTML = "&times;";
        del.onclick = (e) => {
            e.stopPropagation();
            remove(i.id);
        };

        card.appendChild(del);
        card.appendChild(text);
        card.appendChild(meta);

        card.onclick = () => toggleExpand(i.id);
        text.ondblclick = (e) => {
            e.stopPropagation();
            toggleDone(i.id);
        };

        board.appendChild(card);
    });
}

render();
</script>
</body>
</html>
